<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="game-card">
        <div id="score-container">Score: <span id="scoreVal">0</span></div>

        <div id="canvas-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>

            <div id="overlay">
                <h2 id="statusTitle">Snake Pro</h2>
                <button id="actionBtn">Play Game</button>
            </div>
        </div>

        <p style="color: #94a3b8; font-size: 13px; margin-top: 15px;">Use Arrow Keys to Move</p>
    </div>
    <script src="app.js"></script>

</body>

</html>
