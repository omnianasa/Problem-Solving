<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="business-card">
        <div class="profile-picture">
            <img src="https://i.pinimg.com/1200x/91/05/d2/9105d263693481022eea4b8cecacd404.jpg" alt="Profile Picture">
        </div>
        <div class="contact-info">
            <h1 class="name">John Doe</h1>
            <p class="title">Software Engineer</p>
            <p class="social-links">Email: john.doe@example.com</p>
            <p class="social-links">Phone: (123) 456-7890</p>
            <p class="social-links">LinkedIn: linkedin.com/in/johndoe</p>
        </div>
    </div>

</body>

</html>
